  {tag:"영상 시청 후 스스로 답변할 수 있어야하는 질문",title:"핵심 2. 생물과 화학은 공부법이 정반대다",pts:["생물은 (    )를 요구하는 시험이고, 화학은 (    )를 요구하는 시험이다.","화학을 잘하기 위해서는 이론 학습과 문제 풀이 중에 무엇이 더 중요한가? 그리고 그 이유는 무엇인가?","생물을 잘하기 위해서는 이론 학습과 문제 풀이 중에 무엇이 더 중요한가? 그리고 그 이유는 무엇인가?","유기화학은 이론 학습과 문제 풀이를 어떻게 해야하는가? 어떤 문제를 많이 풀어야하는가?"]},

 qs:[
  {t:"multi",txt:"다음 중 메디컬 편입 시험의 특성으로 틀린 것을 모두 고르시오.",opts:["거의 모든 문제를 맞혀야 합격할 수 있다.","오답률 높은 고난이도 문제보다 정답률 높은 기본기 문제를 틀리지 않는 것이 핵심이다.","기본기란 자주 출제되는 주제, 이미 여러 번 출제된 주제, 교수님들이 중요하다고 생각하는 내용을 말한다.","모든 것을 대비하는 공부가 합격에 가장 효율적이다.","지엽적인 것까지 모두 대비해야 합격선을 넘을 수 있다."],ans:[0,3,4]},
  {t:"multi",ul:"항상 참이 아닌(거짓) 이유",txt:"필기고사는 무엇이 나올지 몰라 모든 것을 대비해야 한다는 주장이 실제 편입 시험에서 항상 참이 아닌(거짓) 이유로 옳은 것을 모두 고르시오.",opts:["합격을 위해 2~3개 정도만 틀리거나 거의 다 맞아야만 하는 시험이라면 참이 될 수 있지만, 실제 편입 시험은 거의 다맞아야 하는 시험이 아니기 때문이다.","시험의 난이도가 높고 어려워질수록, 기본기보다는 지엽적인 부분까지 모두 철저히 대비해야만 합격 가능성이 높아지기 때문이다.","26 우석대는 컷이 2~3개 수준으로 거의 다 맞아야했던 쉬운 시험이었지만, 거꾸로 잘생각해보면 시험이 쉽다는 것은 지엽적인 내용이 비중있게 출제되지 않고, 기본기와 핵심적인 문제 중심으로 출제하였다는 것을 의미하기 때문이다.","모든 것을 대비하려는 공부 방식은 오히려 과목별 학습 밸런스를 붕괴시키고 합격까지 걸리는 시간을 늘려 실패 가능성을 높이기 때문이다.","편입 시험에 단기간 성공하기 위해서는 전체적인 큰 그림과 전략보다는 지엽적인 문제에 대한 세부적인 암기가 더 중요하게 작용하기 때문이다."],ans:[0,2,3]},
  {t:"multi",txt:"생물, 화학, 유기화학 학습법에 대한 설명으로 틀린 것을 모두 고르시오.",opts:["생물은 지식을 요구하고, 화학은 숙련도를 요구하는 시험이다.","화학 공부에서 문제가 안 풀리면 이론 위주로 다시 공부해야 한다.","생물은 이론을 여러 번 읽고 질 좋은 문제로 이론에 복귀하는 것이 핵심이다.","유기화학은 이론과 문제풀이를 함께 병행하며 기본 문항 위주로 풀어야 한다.","화학은 이론을 충분히 익힌 후 문제를 풀어야 한다.","생물은 이론보다는 문제를 많이 풀어야 성적이 오른다.","유기화학은 이해보다 암기를 해야한다.","생물은 무엇이 나올지 모르니 지엽적인 내용까지 다 공부해야한다."],ans:[1,4,5,6,7]},
  {t:"multi",txt:"화학이 합격을 결정짓는 핵심 과목인 이유로 옳은 것을 모두 고르시오.",opts:["일반화학은 숙련도를 요구하는 시험이라 올바른 방향으로 꾸준히 학습하지 않으면 일반화학을 잘하는 사람도 성적 편차가 심해지는 과목이다. 그래서 올바른 학습을 꾸준히 하면 경쟁력을 갖기 때문이다.","일반화학은 풀이를 암기하면 해결되기 때문이다.","유기화학은 쉽게 출제되기 때문에 10월 정도부터 벼락치기로 공부해도 되기 때문이다.","유기화학 비중이 점점 높아지고 있고, 유기화학2 까지 제대로 공부해서 시험보는 경쟁자가 많지 않아서 유기화학을 잘하면 경쟁력을 갖기 때문이다."],ans:[0,3]},
  {t:"multi",txt:"기본기의 올바른 정의에 대해 옳은 것을 모두 고르시오.",opts:["난이도가 낮고 쉬운 문제만을 의미한다.","기본서에서 다루는 내용만 기본기이다.","기본기는 문제의 난이도와는 별개의 개념이며, 기출에서 자주 출제되는 주제라면 난이도가 어려워도 기본기에 해당할 수 있다.","기본기는 경쟁자들이 대부분 맞히는 문제이므로 시험장에서 절대 틀려서는 안 되며, 이 기본기 영역에서 점수가 새지 않도록 방어하는 것이 필수적이다.","MDEET, PEET, 변리사, 편입 기출 등과 같이 이미 으레 자주 출제되어 왔던 주제나 문제들을 의미한다."],ans:[2,3,4]},
  {t:"multi",txt:"시험이 어려울수록 기본기가 튼튼한 사람이 합격하는 이유로 옳은 것을 모두 고르시오.",opts:["실제 편입 시험은 모든 문제를 다 맞혀야 합격하는 것이 아니기 때문에, 오답률이 높은 고난이도 문제는 대부분 틀리는 문제를 의미해서 내가 틀려도 합격에 큰 영향이 없으나, 경쟁자들이 대부분 맞히는 정답률이 높은 문제(기본기)에서 점수를 잃게 되면 합격에 큰 영향을 주기 때문이다.","생물과 같은 지식 위주의 과목은 시험이 어렵게 출제될 경우 수험생들이 다 함께 점수가 하락하는 경향이 있어, 결국 흔들리지 않고 확보해 둔 기본기 점수가 당락을 가르는 기반이 되기 때문이다.","본고사에서 출제되는 기본기 문제는 난이도가 낮고 쉬운 문제만을 의미하므로, 기본기가 튼튼하면 본고사 직전에는 기본기보다 오답률이 높은 고난도 심화 문제, 지엽적인 내용에 더 시간을 할애할 수 있기 때문이다.","시험 난이도가 높아질수록 지엽적인 내용의 출제가 늘어나므로, 남들이 틀리는 지엽적이고 생소한 문제까지 완벽하게 대비하고 맞혀야만 경쟁자들과 격차를 벌릴 수 있기 때문이다.","다 맞아야 한다는 잘못된 전제로 남도 틀리고 나도 틀리는 문제에 시간을 낭비하는 대신, 반드시 맞혀야 하는 기본기 문제를 절대 틀리지 않고, 심화문제는 최대한 맞춰서 정답수를 최대로 끌어올리는 것이 올바른 방향성이기 때문이다."],ans:[0,1,4]},
  {t:"multi",txt:"생물은 무작정 많이 푸는 것보다는 질 좋은 문제 위주로 풀면서 문제 base로 이론을 다시 반복 학습해야한다. 여기서 질 좋은 문제가 의미하는 것으로 옳은 것을 모두 고르시오.",opts:["공개 기출(중앙대, 경희대)","MDEET, PEET 기출","실제 메디컬 편입 기출","사설 문제지(학원, 개인 판매 문제 등)","어려운 전공 문제지들"],ans:[0,1,2]}
 ]},

 qs:[

  screen:'login',sub:'slides',tid:null,si:0,qi:0,

function set(o){for(var k in o)S[k]=o[k];render();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getTopic(){return TOPICS.filter(function(x){return x.id===S.tid;})[0];}

function loadEmails(){try{var r=localStorage.getItem('vf_e');if(r)S.emails=JSON.parse(r);}catch(e){S.emails=[];}}
function saveEmails(l){S.emails=l;try{localStorage.setItem('vf_e',JSON.stringify(l));}catch(e){}}

auth.onAuthStateChanged(function(user){
  if(user){
    var cached=sessionStorage.getItem('vf_ok');
    if(cached===user.email.toLowerCase()){S.screen='home';render();return;}
    loadEmails();
    var found=false;
    for(var i=0;i<S.emails.length;i++){
      var em=typeof S.emails[i]==='object'?S.emails[i].email:S.emails[i];
      if(em.toLowerCase()===user.email.toLowerCase()){found=true;break;}
    }
    if(found){sessionStorage.setItem('vf_ok',user.email.toLowerCase());S.screen='home';S.loginMsg='';}
    else{auth.signOut();S.loginMsg='등록되지 않은 계정입니다. 선생님께 이메일 등록을 요청해주세요.';}
  } else {
    sessionStorage.removeItem('vf_ok');
    S.screen='login';
  }
  render();
});

function gLogin(){
  S.loginMsg='';render();
  auth.signInWithPopup(gProvider).catch(function(e){
    if(e.code!=='auth/popup-closed-by-user')S.loginMsg='로그인 오류: '+e.message;
    render();
  });
}
function logout(){auth.signOut();S.unlocked=[1];S.passed={};}
function doAdminLogin(){if(S.adminPw===ADMIN_PW)set({adminOk:true,loginMsg:''});else set({loginMsg:'비밀번호가 틀렸습니다.'});}
function addEmail(){
  var e=(S.newEmail||'').trim().toLowerCase();
  var n=(S.newName||'').trim();
  if(!e||e.indexOf('@')<0){set({adminMsg:'올바른 이메일을 입력하세요.'});return;}
  var found=false;
  for(var i=0;i<S.emails.length;i++){var em=typeof S.emails[i]==='object'?S.emails[i].email:S.emails[i];if(em.toLowerCase()===e){found=true;break;}}
  if(found){set({adminMsg:'이미 등록된 이메일입니다.'});return;}
  var l=S.emails.slice();l.push({email:e,name:n});saveEmails(l);
  set({newEmail:'',newName:'',adminMsg:'등록 완료!'});
  setTimeout(function(){set({adminMsg:''});},2000);
}
function removeEmail(em){
  var l=S.emails.filter(function(x){var xe=typeof x==='object'?x.email:x;return xe!==em;});
  saveEmails(l);render();
}
function loadProgress(){
  set({progressLoading:true});
  db.collection('progress').get().then(function(snap){
    var list=[];
    snap.forEach(function(doc){list.push(doc.data());});
    list.sort(function(a,b){return (a.email||'').localeCompare(b.email||'');});
    set({adminProgress:list,progressLoading:false});
    if(list.length===0) alert('저장된 진도 데이터가 없습니다.\n학생이 아직 테스트를 완료하지 않았거나 Firestore 규칙을 확인해주세요.');
  }).catch(function(e){
    set({progressLoading:false});
    alert('Firestore 오류: '+e.message+'\n\nFirebase Console → Firestore → 규칙에서\nallow read, write: if true; 로 설정해주세요.');
  });
}
function resetProgress(email){
  if(!confirm(email+' 의 진도를 초기화할까요?'))return;
  var emailKey=email.replace(/\./g,'_');
  db.collection('progress').doc(emailKey).delete().then(function(){
    alert('초기화 완료!');loadProgress();
  }).catch(function(e){alert('오류: '+e.message);});
}
function goTopic(id){S.tid=id;S.sub='slides';S.si=0;S.qi=0;S.ans={};S.results=null;S.submitted=false;S.confirmed=false;set({screen:'topic'});}
function pickAns(i){
  var t=getTopic();var q=t.qs[S.qi];
  if(S.submitted)return;
  if(q.t==='multi'){
    var cur=Array.isArray(S.ans[S.qi])?S.ans[S.qi]:[];
    var idx=cur.indexOf(i);
    S.ans[S.qi]=idx>=0?cur.filter(function(v){return v!==i;}):cur.concat([i]);
  } else {S.ans[S.qi]=i;}
  render();
}
function doSubmit(){set({submitted:true});}
function retryQ(){S.ans[S.qi]=undefined;set({submitted:false});}
function nextQ(){set({qi:S.qi+1,submitted:false});}
function goNext(){
  var t=getTopic();if(!t)return;
  if(t.slides[S.si].tag&&!S.confirmed){alert('Yes를 눌러 영상 확인을 완료해주세요!');return;}
  set({si:S.si+1,confirmed:false});
}
function submitTest(){
  var t=getTopic();var correct=0;
  t.qs.forEach(function(q,i){
    var a=S.ans[i];var ok=false;
    if(q.t==='mcq5')ok=a===q.ans;
    else if(q.t==='multi')ok=Array.isArray(a)&&Array.isArray(q.ans)&&a.length===q.ans.length&&q.ans.every(function(v){return a.indexOf(v)>=0;});
    if(ok)correct++;
  });
  var pct=Math.round(correct/t.qs.length*100);
  var passed=pct>=t.pass;
  if(passed){
    S.passed[t.id]=true;
    var next=t.id+1;if(next<=TOPICS.length&&S.unlocked.indexOf(next)<0)S.unlocked.push(next);
    // Firestore에 진도 저장
    var user=auth.currentUser;
    if(user){
      var emailKey=user.email.replace(/\./g,'_');
      var update={email:user.email,updatedAt:new Date().toISOString()};
      update['part'+t.id]=true;
      db.collection('progress').doc(emailKey).set(update,{merge:true}).catch(function(e){console.log('Firestore save error:',e);});
    }
  }
  set({results:{correct:correct,total:t.qs.length,pct:pct,passed:passed},sub:'result'});
}

function render(){
  var app=document.getElementById('app');
  if(S.screen==='login')app.innerHTML=buildLogin();
  else if(S.screen==='home')app.innerHTML=buildHome();
  else if(S.screen==='topic')app.innerHTML=buildTopic();
}

  if(S.sub==='slides')return buildSlides(t);
  if(S.sub==='test')return buildTest(t);
  if(S.sub==='result')return buildResult(t);
  return '';
}

function buildSlides(t){
  var slide=t.slides[S.si];var isLast=S.si===t.slides.length-1;var hasTag=!!slide.tag;var nextOk=!hasTag||S.confirmed;
  var h='<div style="min-height:100vh;background:#070c18;display:flex;flex-direction:column">';
  h+='<div style="position:sticky;top:0;z-index:10;background:rgba(7,12,24,.98);border-bottom:1px solid rgba(255,255,255,.05);padding:0 20px"><div style="max-width:520px;margin:0 auto;display:flex;align-items:center;gap:12px;height:56px">'
   +btn("set({screen:'home'})",'background:none;color:#3a4e72;font-size:18px;padding:4px 8px','←')
   +'<div style="flex:1"><div style="font-size:10px;color:'+t.color+';font-weight:700;letter-spacing:.5px">'+t.part+'</div><div style="font-size:13px;font-weight:700;color:#dde9ff">슬라이드 '+(S.si+1)+' / '+t.slides.length+'</div></div>'
   +'</div></div>';
  h+='<div style="max-width:520px;margin:0 auto;padding:22px 20px 140px;overflow-y:auto;width:100%">';
  if(hasTag)h+='<div style="background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.15);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11.5px;color:#f5a623;font-weight:600">〔 '+esc(slide.tag)+' 〕</div>';
  if(slide.yt)h+='<div style="margin-bottom:18px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.07)"><div style="position:relative;padding-bottom:56.25%;height:0;background:#000"><iframe src="https://www.youtube.com/embed/'+slide.yt+'?rel=0" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none" allowfullscreen loading="lazy"></iframe></div></div>';
  h+='<h2 style="font-size:16px;font-weight:700;color:#e8f0ff;margin-bottom:20px;line-height:1.6">'+esc(slide.title)+'</h2>';
  h+='<div style="display:flex;flex-direction:column;gap:12px">';
  for(var i=0;i<slide.pts.length;i++)h+='<div style="background:#0c1735;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start"><span style="background:'+t.color+';color:#000;font-weight:700;font-size:11px;padding:2px 7px;border-radius:20px;flex-shrink:0;margin-top:2px">'+String(i+1).padStart(2,'0')+'</span><p style="color:#8aa4cc;font-size:13.5px;line-height:1.8">'+esc(slide.pts[i])+'</p></div>';
  h+='</div>';
  if(hasTag&&!S.confirmed)h+='<div style="margin-top:20px;background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);border-radius:12px;padding:16px"><p style="color:#c9a227;font-size:13px;margin-bottom:14px;text-align:center">위 질문에 대한 정답을 영상에서 확인했습니까?</p><div style="display:flex;gap:10px">'+btn("set({confirmed:true})",'flex:1;padding:11px;background:linear-gradient(135deg,'+t.color+','+t.dark+');border-radius:10px;color:#000;font-weight:700;font-size:14px','✓ Yes')+btn("alert('영상을 먼저 시청해주세요!')",'flex:1;padding:11px;background:#111f42;border-radius:10px;color:#3a4e72;font-weight:600;font-size:14px','✗ No')+'</div></div>';
  else if(hasTag&&S.confirmed)h+='<div style="margin-top:20px;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:12px;padding:12px 16px;text-align:center"><span style="color:#4ade80;font-size:13px;font-weight:600">✅ 영상 확인 완료</span></div>';
  h+='</div>';
  h+='<div style="position:fixed;bottom:0;left:0;right:0;border-top:1px solid rgba(255,255,255,.05);padding:12px 20px;background:rgba(7,12,24,.98);z-index:10"><div style="max-width:520px;margin:0 auto;display:flex;gap:10px">';
  if(S.si>0)h+=btn("set({si:"+(S.si-1)+",confirmed:false})",'padding:12px 18px;background:#0c1735;border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#5a6e96;font-size:14px','← 이전');
  if(isLast)h+=btn("set({sub:'test',qi:0,ans:{},submitted:false})",'flex:1;padding:12px;background:linear-gradient(135deg,'+t.color+','+t.dark+');border-radius:10px;color:#000;font-weight:700;font-size:14px','이해도 테스트 시작 →');
  else h+=btn('goNext()','flex:1;padding:12px;background:'+(nextOk?'linear-gradient(135deg,'+t.color+','+t.dark+')':'#0a1020')+';border-radius:10px;color:'+(nextOk?'#000':'#1e2e50')+';font-weight:700;font-size:14px;cursor:'+(nextOk?'pointer':'default'),'다음 →');
  h+='</div></div></div>';
  return h;
}

function buildTest(t){
  var q=t.qs[S.qi];var isLast=S.qi===t.qs.length-1;
  var ans=S.ans[S.qi];var hasAns=q.t==='multi'?(Array.isArray(ans)&&ans.length>0):(ans!==undefined);
  var ca=Array.isArray(q.ans)?q.ans:[q.ans];
  var isOk=false;
  if(S.submitted){if(q.t==='multi')isOk=Array.isArray(ans)&&ans.length===ca.length&&ca.every(function(v){return ans.indexOf(v)>=0;});else isOk=ans===q.ans;}
  var isTtul=q.txt.indexOf('틀린')>=0;var sc=isTtul?'#f87171':'#4ade80';
  var pct=((S.qi+1)/t.qs.length*100).toFixed(0);
  var txtHtml=esc(q.txt);
  if(q.ul)txtHtml=esc(q.txt).replace(esc(q.ul),'<span style="text-decoration:underline;text-underline-offset:3px">'+esc(q.ul)+'</span>');
  else if(isTtul)txtHtml=esc(q.txt).replace('틀린','<span style="text-decoration:underline;text-underline-offset:3px">틀린</span>');
  var opts='';
  for(var i=0;i<(q.opts||[]).length;i++){
    var sel=q.t==='multi'?(Array.isArray(ans)&&ans.indexOf(i)>=0):(ans===i);
    var bc='rgba(255,255,255,.07)',bg='#0c1735',tc='#7a90b8',bb='#111f42';
    if(sel){if(S.submitted){var ir=ca.indexOf(i)>=0;bc=ir?'#4ade80':'#f87171';bg=ir?'rgba(74,222,128,.08)':'rgba(248,113,113,.08)';tc=ir?'#4ade80':'#f87171';bb=ir?'#4ade80':'#f87171';}else{bc=sc;bg=sc==='#f87171'?'rgba(248,113,113,.08)':'rgba(74,222,128,.08)';tc=sc;bb=sc;}}
    opts+='<div onclick="pickAns('+i+')" style="background:'+bg+';border:2px solid '+bc+';border-radius:11px;padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:'+(S.submitted?'default':'pointer')+'">'
     +'<div style="width:22px;height:22px;border-radius:5px;background:'+(sel?bb:'#111f42')+';border:1.5px solid '+(sel?'transparent':'rgba(255,255,255,.15)')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(sel?'<span style="color:#000;font-size:13px;font-weight:700">✓</span>':'')+'</div>'
     +'<span style="color:'+tc+';font-size:14px;line-height:1.6">'+(OPTS[i]||'')+' '+esc(q.opts[i])+'</span></div>';
  }
  var h='<div style="height:100vh;background:#070c18;display:flex;flex-direction:column">';
  h+='<div style="position:sticky;top:0;z-index:10;background:rgba(7,12,24,.98);border-bottom:1px solid rgba(255,255,255,.05);padding:0 20px"><div style="max-width:520px;margin:0 auto;display:flex;align-items:center;gap:12px;height:56px">'
   +btn("set({sub:'slides'})",'background:none;color:#3a4e72;font-size:18px;padding:4px 8px','←')
   +'<div style="flex:1"><div style="font-size:10px;color:'+t.color+';font-weight:700;letter-spacing:.5px">'+t.part+' · 이해도 테스트</div><div style="height:4px;background:#0a1020;border-radius:99px;margin-top:6px"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,'+t.color+','+t.dark+');border-radius:99px;transition:width .4s"></div></div></div>'
   +'<span style="color:#3a4e72;font-size:12px">'+(S.qi+1)+'/'+t.qs.length+'</span></div></div>';
  h+='<div style="max-width:520px;margin:0 auto;padding:22px 20px 140px;overflow-y:auto;flex:1;width:100%"><div style="background:#0c1735;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px">'
   +'<span style="background:'+t.color+';color:#000;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px">Q'+(S.qi+1)+'</span>';
  if(q.t==='multi')h+='<div style="background:'+(isTtul?'rgba(248,113,113,.06)':'rgba(74,222,128,.06)')+';border:1px solid '+(isTtul?'rgba(248,113,113,.2)':'rgba(74,222,128,.2)')+';border-radius:9px;padding:8px 14px;margin:10px 0"><span style="font-size:13px;color:'+(isTtul?'#f87171':'#4ade80')+'">'+(isTtul?'✘':'✔')+' <span style="text-decoration:underline;text-underline-offset:3px">'+(isTtul?'틀린':'옳은')+'</span> 것을 모두 선택하세요</span></div>';
  h+='<p style="color:#dde9ff;font-size:15px;line-height:1.85;font-weight:500;margin:12px 0">'+txtHtml+'</p>'
   +'<div style="display:flex;flex-direction:column;gap:9px">'+opts+'</div>';
  if(S.submitted)h+='<div style="padding:13px 16px;border-radius:10px;margin-top:12px;background:'+(isOk?'rgba(74,222,128,.08)':'rgba(248,113,113,.08)')+';border:1px solid '+(isOk?'rgba(74,222,128,.25)':'rgba(248,113,113,.25)')+';display:flex;align-items:center;gap:8px"><span style="font-size:18px">'+(isOk?'✅':'❌')+'</span><span style="color:'+(isOk?'#4ade80':'#f87171')+';font-size:14px;font-weight:600">'+(isOk?'정답입니다!':'틀렸습니다. 다시 풀어보세요.')+'</span></div>';
  h+='</div></div>';
  h+='<div style="position:fixed;bottom:0;left:0;right:0;border-top:1px solid rgba(255,255,255,.05);padding:12px 20px;background:rgba(7,12,24,.98);z-index:10"><div style="max-width:520px;margin:0 auto;display:flex;gap:10px">';
  if(!S.submitted)h+=btn(hasAns?'doSubmit()':'',' flex:1;padding:12px;background:'+(hasAns?'linear-gradient(135deg,'+t.color+','+t.dark+')':'#0a1020')+';border-radius:10px;color:'+(hasAns?'#000':'#1e2e50')+';font-weight:700;font-size:14px;cursor:'+(hasAns?'pointer':'default')+';opacity:'+(hasAns?1:.35),'제출하기');
  if(S.submitted&&!isOk)h+=btn('retryQ()','flex:1;padding:12px;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);border-radius:10px;color:#f87171;font-weight:700;font-size:14px','🔄 다시 풀기');
  if(S.submitted&&isOk&&!isLast)h+=btn('nextQ()','flex:1;padding:12px;background:linear-gradient(135deg,'+t.color+','+t.dark+');border-radius:10px;color:#000;font-weight:700;font-size:14px','다음 문제 →');
  if(S.submitted&&isOk&&isLast)h+=btn('submitTest()','flex:1;padding:12px;background:linear-gradient(135deg,'+t.color+','+t.dark+');border-radius:10px;color:#000;font-weight:700;font-size:14px','결과 제출 ✓');
  h+='</div></div></div>';
  return h;
}

function buildResult(t){
  var r=S.results;
  var h='<div style="min-height:100vh;background:#070c18;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px">'
   +'<div class="pop" style="background:#0c1735;border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:40px 32px;max-width:360px;width:100%;text-align:center">'
   +'<div style="font-size:56px;margin-bottom:16px">'+(r.passed?'🎉':'💪')+'</div>'
   +'<h2 style="font-size:20px;font-weight:700;color:#e8f0ff;margin-bottom:8px">'+(r.passed?'통과!':'아쉽네요')+'</h2>'
   +'<div style="font-size:48px;font-weight:900;color:'+(r.passed?'#4ade80':'#f5a623')+';margin:16px 0">'+r.pct+'점</div>'
   +'<p style="color:#5a6e96;font-size:13px;margin-bottom:24px">'+r.correct+'/'+r.total+'문제 정답 · 합격 기준 '+t.pass+'점</p>'
   +(r.passed?'<p style="color:#4ade80;font-size:13px;margin-bottom:20px">✅ 다음 파트가 잠금 해제되었습니다!</p>':'<p style="color:#f87171;font-size:13px;margin-bottom:20px">슬라이드를 다시 학습하고 재도전해보세요.</p>')
   +'<div style="display:flex;flex-direction:column;gap:10px">'
   +btn("set({screen:'home'})",'padding:13px;background:linear-gradient(135deg,'+t.color+','+t.dark+');border-radius:10px;color:#000;font-weight:700;font-size:14px','홈으로 돌아가기');
  if(!r.passed)h+=btn("set({sub:'test',qi:0,ans:{},submitted:false,results:null})",'padding:13px;background:#0c1735;border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#5a6e96;font-size:14px','다시 풀기');
  h+='</div></div></div>';
  return h;
}
</script>
</body>
</html>
